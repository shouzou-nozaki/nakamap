spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nakamap}
    username: ${DB_USER:nakamap}
    password: ${DB_PASSWORD:nakamap}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

jwt:
  secret: ${JWT_SECRET:nakamapSecretKey12345678901234567890123456789012}
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    com.nakamap: DEBUG
