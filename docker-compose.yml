version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakamap
      POSTGRES_USER: nakamap
      POSTGRES_PASSWORD: nakamap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakamap"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nakamap
      DB_USER: nakamap
      DB_PASSWORD: nakamap
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
